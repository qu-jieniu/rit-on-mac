name: Build RIT.dmg (macOS)

on:
  workflow_dispatch:
  push:
    paths:
      - "**.sh"
      - "**.yml"
      - "http.sys"
      - "wine-host-matches-star-wildcard.patch"
  release:
    types: [created]

jobs:
  build:
    name: Build RIT.app + RIT.dmg
    runs-on: macos-latest   # Apple Silicon (arm64), free on public repos
    env:
      WS_ENGINE: WS11WineCX64Bit24.0.0

    steps:
      - uses: actions/checkout@v4

      - name: Install Wineskin
        run: brew install --cask --no-quarantine gcenx/wine/wineskin

      # -------- Codesigning prep (only if the secrets are set) --------
      # Required GitHub Secrets to enable Developer-ID signing + notarization:
      #   CODESIGN_P12_BASE64    base64 of an exported Developer ID Application .p12
      #   CODESIGN_P12_PASSWORD  password used when exporting the .p12
      #   CODESIGN_IDENTITY      e.g. "Developer ID Application: Your Name (TEAMID)"
      #   NOTARY_APPLE_ID        Apple ID email
      #   NOTARY_TEAM_ID         10-char Developer Team ID
      #   NOTARY_PASSWORD        app-specific password from appleid.apple.com
      #
      # Without those, the build still runs but ad-hoc signs (no Developer-ID
      # trust, no notarization — same as a local build with no env vars).
      - name: Import Developer ID certificate
        id: import_cert
        if: ${{ secrets.CODESIGN_P12_BASE64 != '' }}
        env:
          P12_BASE64:   ${{ secrets.CODESIGN_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.CODESIGN_P12_PASSWORD }}
        run: |
          set -euo pipefail
          # Create an ephemeral keychain so the run doesn't trash the default one.
          KEYCHAIN="$RUNNER_TEMP/rit-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          # Decode + import the .p12.
          P12_PATH="$RUNNER_TEMP/devid.p12"
          printf '%s' "$P12_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$P12_PATH"

          # Let codesign use the imported key non-interactively.
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          # Put our keychain at the head of the search list so codesign finds it.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')

          # Sanity check.
          security find-identity -p codesigning -v "$KEYCHAIN"

          echo "keychain=$KEYCHAIN" >> "$GITHUB_OUTPUT"

      - name: Store notarytool credentials
        if: ${{ secrets.NOTARY_APPLE_ID != '' }}
        env:
          APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          TEAM_ID:  ${{ secrets.NOTARY_TEAM_ID }}
          PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "rit-notary" \
            --apple-id "$APPLE_ID" \
            --team-id  "$TEAM_ID" \
            --password "$PASSWORD"

      # -------- The actual build --------
      - name: Build the wrapper + DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          NOTARY_PROFILE:    ${{ secrets.NOTARY_APPLE_ID != '' && 'rit-notary' || '' }}
        run: |
          chmod +x ./build-rit-app.sh
          ./build-rit-app.sh

      # -------- Always clean up the keychain --------
      - name: Remove ephemeral keychain
        if: always() && steps.import_cert.outputs.keychain != ''
        run: |
          security delete-keychain "${{ steps.import_cert.outputs.keychain }}" || true

      # -------- Publish --------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIT-${{ github.sha }}
          path: out/RIT.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/RIT.dmg
