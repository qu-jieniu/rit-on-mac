name: Build RIT.pkg (macOS)

"on":
  workflow_dispatch:
  push:
    paths:
      - "**.sh"
      - "**.yml"
      - "wine-version.txt"
      - "http.sys"
      - "wine-host-matches-star-wildcard.patch"
      - "RIT.iconset/**"
  pull_request:
    paths:
      - "**.sh"
      - "**.yml"
      - "wine-version.txt"
      - "http.sys"
      - "RIT.iconset/**"
  release:
    types: [created]

jobs:
  build:
    name: Build RIT.app + RIT.dmg
    runs-on: macos-latest   # Apple Silicon (arm64); GPTK runs natively here

    steps:
      - uses: actions/checkout@v4

      - name: Install winetricks
        run: brew install winetricks

      - name: Cache wine engine + prefix (saves ~10 min .NET install per run)
        uses: actions/cache@v4
        with:
          path: |
            .work/*.tar.xz
            .work/wine
            .work/prefix
          key: build-${{ runner.os }}-${{ hashFiles('wine-version.txt', 'http.sys') }}

      # -------- Codesigning prep (only if the secrets are set) --------
      # Required GitHub Secrets to enable Developer-ID signing + notarization:
      #   CODESIGN_P12_BASE64    base64 of an exported Developer ID Application .p12
      #   CODESIGN_P12_PASSWORD  password used when exporting the .p12
      #   CODESIGN_IDENTITY      e.g. "Developer ID Application: Your Name (TEAMID)"
      #   NOTARY_APPLE_ID        Apple ID email
      #   NOTARY_TEAM_ID         10-char Developer Team ID
      #   NOTARY_PASSWORD        app-specific password from appleid.apple.com
      #
      # Without those, the build still runs but ad-hoc signs (no Developer-ID
      # trust, no notarization).
      - name: Detect signing config
        id: signing
        env:
          HAS_CODESIGN: ${{ secrets.CODESIGN_P12_BASE64 != '' }}
          HAS_NOTARY:   ${{ secrets.NOTARY_APPLE_ID    != '' }}
        run: |
          echo "codesign=$HAS_CODESIGN" >> "$GITHUB_OUTPUT"
          echo "notarize=$HAS_NOTARY"   >> "$GITHUB_OUTPUT"
          echo "codesign=$HAS_CODESIGN notarize=$HAS_NOTARY"

      - name: Import Developer ID certificate
        id: import_cert
        if: steps.signing.outputs.codesign == 'true'
        env:
          P12_BASE64:   ${{ secrets.CODESIGN_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.CODESIGN_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/rit-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          P12_PATH="$RUNNER_TEMP/devid.p12"
          printf '%s' "$P12_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$P12_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          # Put our keychain at the head of the search list so codesign finds it.
          OTHER_KEYCHAINS=$(security list-keychains -d user | tr -d '"' | xargs)
          security list-keychains -d user -s "$KEYCHAIN" $OTHER_KEYCHAINS

          security find-identity -p codesigning -v "$KEYCHAIN"
          echo "keychain=$KEYCHAIN" >> "$GITHUB_OUTPUT"

      - name: Store notarytool credentials
        if: steps.signing.outputs.notarize == 'true'
        env:
          APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          TEAM_ID:  ${{ secrets.NOTARY_TEAM_ID }}
          PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "rit-notary" \
            --apple-id "$APPLE_ID" \
            --team-id  "$TEAM_ID" \
            --password "$PASSWORD"

      # -------- The actual build --------
      - name: Build the wrapper + pkg
        env:
          # GH_TOKEN auth raises the GitHub API rate limit; without it the
          # script's release lookup hits 403 from anonymous calls.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          INSTALLER_IDENTITY: ${{ secrets.INSTALLER_IDENTITY }}
          NOTARY_PROFILE: ${{ steps.signing.outputs.notarize == 'true' && 'rit-notary' || '' }}
        run: |
          chmod +x ./build-rit-app.sh
          ./build-rit-app.sh

      # -------- Smoke test: install + launch + API health --------
      # Goal: prove the freshly-built pkg actually produces a working RIT install.
      # Strategy: install the pkg, open RIT.app, wait for Client.exe's window to
      # render (LaunchServices transitions it to Foreground around T+10s), then
      # curl localhost:9999/v1/case and expect HTTP 401 — that response is what
      # we get when:
      #   - Wine launched ✅
      #   - dfshim → dfsvc → Client.exe pipeline completed ✅
      #   - Client.exe's HttpListener bound to :9999 ✅
      #   - http.sys host_matches accepts the `*` wildcard URL (the bug we
      #     patched for GPTK) ✅
      # 401 specifically (vs 200) is correct here — we have no API key. A 200
      # would actually be worse (it'd mean the API isn't requiring auth).
      - name: Smoke test the .pkg
        id: smoke
        run: |
          set -euo pipefail
          PKG=out/RIT.pkg
          test -f "$PKG" || { echo "::error::out/RIT.pkg missing"; exit 1; }

          # GitHub runners pre-install Rosetta on Apple Silicon (since macos-15);
          # double-check and install if not present, since the bundled wine is
          # x86_64 and won't run without it on M-series.
          if [ "$(uname -m)" = "arm64" ] && ! pgrep -q oahd 2>/dev/null; then
              echo "Installing Rosetta 2..."
              softwareupdate --install-rosetta --agree-to-license || true
          fi

          echo "==> Installing pkg"
          sudo installer -pkg "$PKG" -target / -verbose 2>&1 | tail -20

          test -d /Applications/RIT.app || { echo "::error::pkg installed but /Applications/RIT.app missing"; exit 1; }

          echo "==> Launching RIT.app"
          open /Applications/RIT.app

          # Wait up to 60s for Client.exe to reach Foreground.
          # The launcher's dfsvc-killer also triggers off this state, so its
          # presence is the same readiness signal we use in the bash launcher.
          echo "==> Waiting for Client.exe to reach Foreground (up to 60s)..."
          for i in $(seq 1 60); do
              CLIENT=$(pgrep -f 'Client\.exe' 2>/dev/null | head -1 || true)
              if [ -n "$CLIENT" ] && lsappinfo info -app "$CLIENT" 2>/dev/null | grep -qF 'type="Foreground"'; then
                  echo "::notice::Client.exe (PID $CLIENT) Foreground at T+${i}s"
                  break
              fi
              sleep 1
          done
          if [ -z "${CLIENT:-}" ] || ! lsappinfo info -app "$CLIENT" 2>/dev/null | grep -qF 'type="Foreground"'; then
              echo "::error::Client.exe did not reach Foreground within 60s"
              echo "Process snapshot:"
              ps -axo pid,command | grep -E 'wine|Client|dfsvc' | grep -v grep || true
              exit 1
          fi

          echo "==> API health check (curl :9999/v1/case)"
          # Give RIT a moment to bind its listener — Foreground may slightly
          # precede the API socket being ready.
          for i in $(seq 1 15); do
              STATUS=$(curl -s -o /dev/null -w '%{http_code}' --max-time 3 http://localhost:9999/v1/case 2>/dev/null || echo "000")
              echo "  attempt $i: HTTP $STATUS"
              if [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ]; then
                  echo "::notice::API responded with HTTP $STATUS (listener is alive)"
                  break
              fi
              sleep 2
          done
          if [ "$STATUS" != "401" ] && [ "$STATUS" != "200" ]; then
              echo "::error::API health check failed — expected 401 (or 200), got HTTP $STATUS"
              exit 1
          fi

          # Cleanup so artifact upload isn't racing wine processes
          pkill -9 -f 'wine|Client\.exe|dfsvc' 2>/dev/null || true
          sleep 2
          echo "::notice::Smoke test PASSED"

      # -------- Always clean up the keychain --------
      - name: Remove ephemeral keychain
        if: always() && steps.import_cert.outputs.keychain != ''
        run: |
          security delete-keychain "${{ steps.import_cert.outputs.keychain }}" || true

      # -------- Publish --------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIT-${{ github.sha }}
          path: out/RIT.pkg
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/RIT.pkg
