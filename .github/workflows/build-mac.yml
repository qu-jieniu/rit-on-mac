name: Build RIT.dmg (macOS)

"on":
  workflow_dispatch:
  push:
    paths:
      - "**.sh"
      - "**.yml"
      - "http.sys"
      - "wine-host-matches-star-wildcard.patch"
  release:
    types: [created]

jobs:
  build:
    name: Build RIT.app + RIT.dmg
    runs-on: macos-latest   # Apple Silicon (arm64), free on public repos
    env:
      WS_ENGINE: WS11WineCX64Bit24.0.0

    steps:
      - uses: actions/checkout@v4

      - name: Install Wineskin Winery
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # gcenx's homebrew taps have shuffled the wineskin cask around;
          # try them quickly, then fall through to a direct release download.
          if brew install --cask gcenx/wineskin/wineskin 2>/dev/null; then
            echo "Installed Wineskin via gcenx/wineskin tap"
          elif brew install --cask gcenx/wine/wineskin 2>/dev/null; then
            echo "Installed Wineskin via legacy gcenx/wine tap"
          else
            echo "Tap installs failed; falling back to direct release download."
            API="https://api.github.com/repos/Gcenx/WineskinServer/releases"
            AUTH=(-H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github+json")

            echo "Releases visible to us:"
            curl -fsSL "${AUTH[@]}" "$API" | jq -r '.[] | "  \(.tag_name)  \(.name)  draft=\(.draft) prerelease=\(.prerelease)"' | head -10

            # Pick the newest release that has a Winery/Wineskin .zip asset.
            ASSET_URL=$(curl -fsSL "${AUTH[@]}" "$API" \
                        | jq -r 'first(.[] | .assets[]? | select(.name|test("Winery|Wineskin"; "i")) | select(.name|endswith(".zip"))).browser_download_url')

            [ -n "$ASSET_URL" ] && [ "$ASSET_URL" != "null" ] || { echo "No Wineskin asset found"; exit 1; }
            echo "Downloading: $ASSET_URL"
            curl -fsSL "${AUTH[@]}" "$ASSET_URL" -o /tmp/winery.zip
            ditto -x -k /tmp/winery.zip /tmp/winery
            APP_PATH=$(find /tmp/winery -name "Wineskin*Winery*.app" -maxdepth 4 -type d | head -1)
            [ -n "$APP_PATH" ] || { echo "No .app found inside the zip"; find /tmp/winery -type d | head -20; exit 1; }
            mv "$APP_PATH" "/Applications/Wineskin Winery.app"
          fi
          xattr -dr com.apple.quarantine "/Applications/Wineskin Winery.app" || true
          ls -la "/Applications/Wineskin Winery.app/Contents/Resources/" | head -5

      # -------- Codesigning prep (only if the secrets are set) --------
      # Required GitHub Secrets to enable Developer-ID signing + notarization:
      #   CODESIGN_P12_BASE64    base64 of an exported Developer ID Application .p12
      #   CODESIGN_P12_PASSWORD  password used when exporting the .p12
      #   CODESIGN_IDENTITY      e.g. "Developer ID Application: Your Name (TEAMID)"
      #   NOTARY_APPLE_ID        Apple ID email
      #   NOTARY_TEAM_ID         10-char Developer Team ID
      #   NOTARY_PASSWORD        app-specific password from appleid.apple.com
      #
      # Without those, the build still runs but ad-hoc signs (no Developer-ID
      # trust, no notarization).
      - name: Detect signing config
        id: signing
        env:
          HAS_CODESIGN: ${{ secrets.CODESIGN_P12_BASE64 != '' }}
          HAS_NOTARY:   ${{ secrets.NOTARY_APPLE_ID    != '' }}
        run: |
          echo "codesign=$HAS_CODESIGN" >> "$GITHUB_OUTPUT"
          echo "notarize=$HAS_NOTARY"   >> "$GITHUB_OUTPUT"
          echo "codesign=$HAS_CODESIGN notarize=$HAS_NOTARY"

      - name: Import Developer ID certificate
        id: import_cert
        if: steps.signing.outputs.codesign == 'true'
        env:
          P12_BASE64:   ${{ secrets.CODESIGN_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.CODESIGN_P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/rit-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

          P12_PATH="$RUNNER_TEMP/devid.p12"
          printf '%s' "$P12_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" \
            -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$P12_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

          # Put our keychain at the head of the search list so codesign finds it.
          OTHER_KEYCHAINS=$(security list-keychains -d user | tr -d '"' | xargs)
          security list-keychains -d user -s "$KEYCHAIN" $OTHER_KEYCHAINS

          security find-identity -p codesigning -v "$KEYCHAIN"
          echo "keychain=$KEYCHAIN" >> "$GITHUB_OUTPUT"

      - name: Store notarytool credentials
        if: steps.signing.outputs.notarize == 'true'
        env:
          APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          TEAM_ID:  ${{ secrets.NOTARY_TEAM_ID }}
          PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
        run: |
          xcrun notarytool store-credentials "rit-notary" \
            --apple-id "$APPLE_ID" \
            --team-id  "$TEAM_ID" \
            --password "$PASSWORD"

      # -------- The actual build --------
      - name: Build the wrapper + DMG
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          NOTARY_PROFILE: ${{ steps.signing.outputs.notarize == 'true' && 'rit-notary' || '' }}
        run: |
          chmod +x ./build-rit-app.sh
          ./build-rit-app.sh

      # -------- Always clean up the keychain --------
      - name: Remove ephemeral keychain
        if: always() && steps.import_cert.outputs.keychain != ''
        run: |
          security delete-keychain "${{ steps.import_cert.outputs.keychain }}" || true

      # -------- Publish --------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RIT-${{ github.sha }}
          path: out/RIT.dmg
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: out/RIT.dmg
