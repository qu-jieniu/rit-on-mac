name: Debug session on macOS runner (VNC + SSH)

# Manual-only. The job spins up macos-latest, builds RIT.app, starts the
# macOS built-in Screen Sharing (VNC) server on :5900, and opens a tmate
# SSH session you can attach to. From your local machine you connect with:
#
#   ssh -L 5900:localhost:5900 <tmate user>@<tmate host>
#
# (the exact ssh command is printed in the runner log when tmate starts.)
#
# Then open a VNC client and connect to localhost:5900 with username 'runner'
# and the password printed by the workflow. The tmate session keeps the runner
# alive for up to 6 hours (GitHub's hard job cap) or until you press
# `touch ~/continue` inside it.

"on":
  workflow_dispatch:
    inputs:
      do_build:
        description: "Re-build RIT.app before opening the session"
        required: false
        default: "true"

jobs:
  debug:
    name: Mac runner debug session
    runs-on: macos-latest
    timeout-minutes: 300   # max 5 hours; GitHub kills at 6 anyway

    steps:
      - uses: actions/checkout@v4

      - name: Install winetricks
        if: ${{ inputs.do_build == 'true' }}
        run: brew install winetricks

      - name: Cache wine engine + prefix
        if: ${{ inputs.do_build == 'true' }}
        uses: actions/cache@v4
        with:
          path: |
            .work/*.tar.xz
            .work/wine
            .work/prefix
          key: build-${{ runner.os }}-gptk-${{ hashFiles('http.sys') }}

      - name: Build RIT.app
        if: ${{ inputs.do_build == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_CODESIGN: "1"   # save time during a debug session
        run: |
          chmod +x ./build-rit-app.sh
          ./build-rit-app.sh
          ls -la out/

      - name: Enable Screen Sharing (VNC) on :5900
        env:
          VNC_PASSWORD: ${{ github.run_id }}-rit   # ephemeral, only valid this run
        run: |
          set -euo pipefail
          # macOS Screen Sharing supports a "legacy" VNC password mode. Set
          # that so a plain VNC client (no Apple ID auth, no Mac-only client)
          # can connect.
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure -access -on \
            -clientopts -setvnclegacy -vnclegacy yes \
                        -setvncpw -vncpw "$VNC_PASSWORD" \
            -restart -agent -privs -all

          # Also let the 'runner' account log in as a normal Mac user (Screen
          # Sharing authenticates against macOS user accounts when not using
          # the legacy VNC password — we set both so either path works).
          sudo dscl . -passwd /Users/runner "$VNC_PASSWORD"

          # Make sure the service is up.
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist || true

          echo "::add-mask::$VNC_PASSWORD"
          echo
          echo "=========================================================="
          echo " VNC ready on the runner."
          echo "   user:     runner"
          echo "   password: ${VNC_PASSWORD}"
          echo
          echo " Next step: a tmate session opens; copy its 'ssh ...' line,"
          echo " then on your local machine run:"
          echo
          echo "   ssh -L 5900:localhost:5900 <tmate-ssh-line>"
          echo
          echo " and point a VNC client at localhost:5900"
          echo "=========================================================="

      - name: Open tmate SSH session
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true       # only your GitHub account can attach
          detached: false                   # keep the job alive while you're in
